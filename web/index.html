<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Floor Planner Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" href="data:,">
</head>
<body>

    <h1 class="title">Cedar Floor Planner</h1>

    <div class="dashboard">

        <div class="side-panel">
    
            <div class="card">
                <h3>Legend</h3>
                <hr>
    
                <div class="legend-row" data-category="common">
                    <span class="legend-box common-box"></span>
                    <span>Common Spaces</span>
                </div>
    
                <div class="legend-row" data-category="private">
                    <span class="legend-box private-box"></span>
                    <span>Private Spaces</span>
                </div>
    
            </div>
    
            <div class="card">
                <div id="metrics"></div>
            </div>
    
        </div>
    
        <div class="canvas-panel">
            <div class="canvas-controls">
                <button id="zoom-in" class="control-button">+</button>
                <button id="zoom-out" class="control-button">−</button>
                <button id="recenter" class="control-button">⟲</button>
            </div>
            <div id="canvas-container">
                <svg id="floorplan"></svg>
            </div>
        </div>

        <div class="variant-panel">
            <div class="variant-header">
                <h3 class="variant-title">Layout Variants</h3>
                <p class="variant-subtitle">Sorted by packing efficiency (best → worst)</p>
                <button id="compare-toggle">Compare</button>
            </div>
            <div id="variant-grid"></div>
        </div>
    
    </div>
    
    <div id="tooltip"></div>
    <script src="app.js"></script>
    
    </body>
</html>
